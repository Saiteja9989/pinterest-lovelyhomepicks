name: Post Pinterest Pin

on:
  schedule:
    # All times in UTC. US Eastern = UTC-4 (EDT, March-Nov)
    # Posting 20 pins/day at US peak hours

    # Morning (7:00 AM - 8:30 AM EDT)
    - cron: '0 11 * * *'    # 7:00 AM EDT
    - cron: '30 11 * * *'   # 7:30 AM EDT
    - cron: '0 12 * * *'    # 8:00 AM EDT
    - cron: '30 12 * * *'   # 8:30 AM EDT

    # Lunch (12:00 PM - 1:30 PM EDT)
    - cron: '0 16 * * *'    # 12:00 PM EDT
    - cron: '30 16 * * *'   # 12:30 PM EDT
    - cron: '0 17 * * *'    # 1:00 PM EDT
    - cron: '30 17 * * *'   # 1:30 PM EDT

    # Evening Peak (7:00 PM - 12:30 AM EDT)
    - cron: '0 23 * * *'    # 7:00 PM EDT
    - cron: '30 23 * * *'   # 7:30 PM EDT
    - cron: '0 0 * * *'     # 8:00 PM EDT
    - cron: '30 0 * * *'    # 8:30 PM EDT
    - cron: '0 1 * * *'     # 9:00 PM EDT
    - cron: '30 1 * * *'    # 9:30 PM EDT
    - cron: '0 2 * * *'     # 10:00 PM EDT
    - cron: '30 2 * * *'    # 10:30 PM EDT
    - cron: '0 3 * * *'     # 11:00 PM EDT
    - cron: '30 3 * * *'    # 11:30 PM EDT
    - cron: '0 4 * * *'     # 12:00 AM EDT
    - cron: '30 4 * * *'    # 12:30 AM EDT

  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  post_pin:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit updated pins_queue.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post next pin
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          FREEPIK_API_KEY:         ${{ secrets.FREEPIK_API_KEY }}
          BLOGGER_BLOG_ID:         ${{ secrets.BLOGGER_BLOG_ID }}
          MAKE_WEBHOOK_URL:        ${{ secrets.MAKE_WEBHOOK_URL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python post_pin.py

      - name: Commit updated pins_queue.json
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add pins_queue.json
          git diff --staged --quiet || git commit -m "Mark pin as posted [skip ci]"
          git push
